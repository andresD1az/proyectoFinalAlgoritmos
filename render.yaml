# =============================================================
# render.yaml — Configuración de despliegue nativo en Render
# Plan Free: Web Service (Python) + PostgreSQL 90 días gratis
# SIN Docker — despliegue directo desde requirements.txt
# =============================================================

services:
  - type: web
    name: bvc-analytics-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py api"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bvc-analytics-db
          property: connectionString
      - key: API_HOST
        value: "0.0.0.0"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: bvc-analytics-db
    plan: free
    databaseName: bvc_analytics
    user: bvc_user
